<!DOCTYPE html>
<html>
<head>
    <title>Formulario con estilos CSS</title>
    <link rel="stylesheet" type="text/css" href="estilos.css">
</head>

<body>

<div class="contenedor">

    <div class="contenedor-logo">
        <img src="logo.png" width="170" height="170">
    </div>

    <h1>FORMULARIO DE CAPTURA DE DATOS</h1>
    <h2>NUEVO PEDIDO</h2>

    <form>

        <div class="columnas">

            <div class="cuadro-azul">
                <table>
                    <tr>
                        <td>Nombre:</td>
                        <td><input type="text" class="dato"></td>
                    </tr>

                    <tr>
                        <td>Apellidos:</td>
                        <td><input type="text" class="dato"></td>
                    </tr>

                    <tr>
                        <td>Dirección:</td>
                        <td><input type="text" class="dato"></td>
                    </tr>
                </table>
            </div>

            <div class="cuadro-azul">
                <p>Número de tarjeta de crédito</p>

                <input type="text" class="dato"><br><br>

                <input type="radio" name="banco"> BCP <br><br>
                <input type="radio" name="banco"> BBVA <br><br>
                <input type="radio" name="banco"> Interbank <br><br>
                <input type="radio" name="banco"> Scotiabank
            </div>

        </div>

        <div class="contenedor-enviar">
            <input type="submit" value="REALIZAR PEDIDO">
        </div>

    </form>

    <div class="pie">
        <p>Copyright 2021 - All rights reserved flower shop</p>
        <p>Programmer: Gilberto Behena Salas</p>
    </div>

</div>

</body>
</html>
